      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55efc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" />
  <!-- Brain/AI icon shape -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="72" font-weight="bold"
        text-anchor="middle" fill="white">H</text>
  <!-- Small AI indicator -->
  <circle cx="148" cy="60" r="22" fill="#00B894" />
